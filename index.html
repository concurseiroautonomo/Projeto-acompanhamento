<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancário Pro FGV - Planejador</title>
    <!-- React e Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Core (Data) -->
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* Esconder scrollbar mas manter funcionalidade */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        /**
         * Componente Icon Robusto
         * Bypassa problemas de UMD do lucide-react renderizando o SVG diretamente do lucide-core
         */
        const Icon = ({ name, size = 20, className = "" }) => {
            const [svgContent, setSvgContent] = useState("");

            useEffect(() => {
                // Tenta pegar o ícone do objeto global 'lucide'
                const icon = window.lucide?.icons[name.toLowerCase()] || 
                             window.lucide?.icons[name] || 
                             window.lucide?.icons['help-circle'];
                
                if (icon) {
                    // icon[2] contém a estrutura do SVG no lucide-core
                    const content = icon[2].map(tag => {
                        const [tagName, attrs] = tag;
                        const attrStr = Object.entries(attrs)
                            .map(([k, v]) => `${k.replace(/[A-Z]/g, m => "-" + m.toLowerCase())}="${v}"`)
                            .join(' ');
                        return `<${tagName} ${attrStr}></${tagName}>`;
                    }).join('');
                    setSvgContent(content);
                }
            }, [name]);

            return (
                <svg
                    width={size}
                    height={size}
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    strokeWidth="2"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    className={className}
                    dangerouslySetInnerHTML={{ __html: svgContent }}
                />
            );
        };

        const App = () => {
            // Persistência
            const [studyLogs, setStudyLogs] = useState(() => {
                try {
                    const saved = localStorage.getItem('bancario_study_logs');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) { return []; }
            });

            const [completedTasks, setCompletedTasks] = useState(() => {
                try {
                    const saved = localStorage.getItem('bancario_completed_tasks');
                    return saved ? JSON.parse(saved) : {};
                } catch (e) { return {}; }
            });

            // Estados de Controle
            const [currentCycleDay, setCurrentCycleDay] = useState(1);
            const [activeTab, setActiveTab] = useState('hoje');
            const [timerSeconds, setTimerSeconds] = useState(0);
            const [isTimerRunning, setIsTimerRunning] = useState(false);
            const [deletingId, setDeletingId] = useState(null);
            
            // Formulário
            const [formData, setFormData] = useState({ 
                materia: 'Português', 
                assunto: '', 
                horas: '', 
                acertos: '', 
                erros: '' 
            });

            useEffect(() => {
                localStorage.setItem('bancario_study_logs', JSON.stringify(studyLogs));
            }, [studyLogs]);

            useEffect(() => {
                localStorage.setItem('bancario_completed_tasks', JSON.stringify(completedTasks));
            }, [completedTasks]);

            // Cronômetro
            useEffect(() => {
                let interval = null;
                if (isTimerRunning) {
                    interval = setInterval(() => setTimerSeconds(s => s + 1), 1000);
                } else {
                    clearInterval(interval);
                }
                return () => clearInterval(interval);
            }, [isTimerRunning]);

            const formatTime = (s) => {
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const sec = s % 60;
                return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
            };

            const materias = ["Português", "Conhecimentos Bancários", "Matemática", "Vendas e Negociação", "Informática", "Inglês", "Redação"];

            const schedule = [
                { day: 1, type: "Folga", hours: 6, tasks: [
                    { id: "d1-r1", title: "Revisão de 1 dia", cat: "Revisão" },
                    { id: "d1-r7", title: "Revisão de 7 dias", cat: "Revisão" },
                    { id: "d1-ma", title: "Matéria A (Português)", detail: "Teoria e Exercícios FGV", cat: "Estudo" },
                    { id: "d1-mb", title: "Matéria B (Bancários)", detail: "Teoria e Exercícios", cat: "Estudo" }
                ], tips: "FGV Português: A banca prioriza a 'reescritura de frases' e coerência." },
                { day: 2, type: "Trabalho", hours: 3, tasks: [
                    { id: "d2-r1", title: "Revisão de 1 dia", cat: "Revisão" },
                    { id: "d2-mc", title: "Matéria C (Matemática)", detail: "Exercícios de Base", cat: "Estudo" }
                ], tips: "Matemática FGV: Foque em raciocínio lógico e diagramas de Venn." },
                { day: 3, type: "Folga", hours: 6, tasks: [
                    { id: "d3-r1", title: "Revisão de 1 dia", cat: "Revisão" },
                    { id: "d3-r7", title: "Revisão de 7 dias", cat: "Revisão" },
                    { id: "d3-md", title: "Matéria D (Vendas)", cat: "Estudo" },
                    { id: "d3-me", title: "Matéria E (Informática)", cat: "Estudo" }
                ], tips: "Informática: A FGV ama cobrar as ferramentas de segurança do Windows." },
                { day: 4, type: "Trabalho", hours: 3, tasks: [
                    { id: "d4-r1", title: "Revisão de 1 dia", cat: "Revisão" },
                    { id: "d4-mf", title: "Matéria F (Inglês)", cat: "Estudo" }
                ], tips: "Inglês: Atenção a advérbios de frequência e conectores lógicos." },
                { day: 5, type: "Folga", hours: 6, tasks: [
                    { id: "d5-r1", title: "Revisão de 1 dia", cat: "Revisão" },
                    { id: "d5-ma", title: "Avanço Português", cat: "Avanço" },
                    { id: "d5-mb", title: "Avanço Bancários", cat: "Avanço" }
                ], tips: "Bancários: Revise as funções do Banco Central e as metas de inflação." },
                { day: 6, type: "Trabalho", hours: 3, tasks: [
                    { id: "d6-r1", title: "Revisão de 1 dia", cat: "Revisão" },
                    { id: "d6-mc", title: "Avanço Matemática", cat: "Avanço" }
                ], tips: "Matemática: Pratique probabilidade e estatística básica." },
                { day: 7, type: "Livre", hours: 0, tasks: [
                    { id: "d7-sim", title: "Simulado Completo", cat: "Avaliação" },
                    { id: "d7-red", title: "Redação", cat: "Avaliação" }
                ], tips: "Redação: Use conectores formais (Ademais, Outrossim, Portanto)." }
            ];

            const currentDay = schedule[currentCycleDay - 1];

            // Métricas
            const metrics = useMemo(() => {
                const h = studyLogs.reduce((a, b) => a + (b.horas || 0), 0);
                const ac = studyLogs.reduce((a, b) => a + (b.acertos || 0), 0);
                const er = studyLogs.reduce((a, b) => a + (b.erros || 0), 0);
                const total = ac + er;
                return {
                    horas: h.toFixed(1),
                    aproveitamento: total > 0 ? ((ac / total) * 100).toFixed(1) : "0",
                    questoes: total,
                    acertos: ac,
                    erros: er
                };
            }, [studyLogs]);

            const handleAddLog = (e) => {
                e.preventDefault();
                if (!formData.assunto || !formData.horas) return;
                const newLog = {
                    id: Date.now(),
                    date: new Date().toLocaleDateString('pt-BR'),
                    ...formData,
                    horas: parseFloat(formData.horas),
                    acertos: parseInt(formData.acertos || 0),
                    erros: parseInt(formData.erros || 0)
                };
                setStudyLogs([newLog, ...studyLogs]);
                setFormData({ materia: 'Português', assunto: '', horas: '', acertos: '', erros: '' });
            };

            const toggleTask = (tid) => {
                setCompletedTasks(prev => ({...prev, [tid]: !prev[tid]}));
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="bg-indigo-950 text-white p-6 sticky top-0 z-40 shadow-lg">
                        <div className="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-3">
                                <div className="p-2 bg-indigo-500 rounded-xl shadow-lg"><Icon name="Zap" className="text-white" /></div>
                                <div>
                                    <h1 className="text-xl font-black tracking-tight italic">BANCÁRIO <span className="text-indigo-400">FGV</span></h1>
                                    <p className="text-indigo-300 text-[10px] font-bold uppercase tracking-widest">Dashboard de Metas</p>
                                </div>
                            </div>
                            <nav className="flex bg-indigo-900/60 p-1 rounded-2xl border border-indigo-800">
                                {['hoje', 'dashboard', 'ciclo'].map(tab => (
                                    <button 
                                        key={tab}
                                        onClick={() => setActiveTab(tab)}
                                        className={`px-5 py-2 rounded-xl text-xs font-black uppercase transition-all ${activeTab === tab ? 'bg-indigo-500 text-white' : 'text-indigo-400 hover:text-white'}`}
                                    >
                                        {tab}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto p-4 md:p-8 flex-1 w-full animate-fade-in">
                        {activeTab === 'hoje' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                <div className="lg:col-span-2 space-y-6">
                                    <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-200">
                                        <div className="flex items-center justify-between mb-6">
                                            <div>
                                                <h2 className="text-2xl font-black text-slate-800">Dia {currentDay.day}</h2>
                                                <p className="text-sm font-bold text-indigo-600 uppercase tracking-tighter">{currentDay.type} • Meta: {currentDay.hours}h</p>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => setCurrentCycleDay(d => d > 1 ? d - 1 : 7)} className="p-2 bg-slate-50 text-slate-400 hover:text-indigo-500 rounded-full transition-colors"><Icon name="ChevronLeft"/></button>
                                                <button onClick={() => setCurrentCycleDay(d => d < 7 ? d + 1 : 1)} className="p-2 bg-slate-50 text-slate-400 hover:text-indigo-500 rounded-full transition-colors"><Icon name="ChevronRight"/></button>
                                            </div>
                                        </div>
                                        <div className="space-y-3">
                                            {currentDay.tasks.map(task => (
                                                <div 
                                                    key={task.id} 
                                                    onClick={() => toggleTask(task.id)}
                                                    className={`flex items-center gap-4 p-4 rounded-2xl border-2 transition-all cursor-pointer ${completedTasks[task.id] ? 'bg-emerald-50 border-emerald-100 opacity-60' : 'bg-white border-slate-50 hover:border-indigo-100 shadow-sm'}`}
                                                >
                                                    <Icon 
                                                        name={completedTasks[task.id] ? "CheckCircle2" : "Circle"} 
                                                        className={completedTasks[task.id] ? "text-emerald-500" : "text-slate-200"} 
                                                    />
                                                    <div>
                                                        <p className={`font-bold text-sm ${completedTasks[task.id] ? 'line-through text-slate-400' : 'text-slate-800'}`}>{task.title}</p>
                                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">{task.cat}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="bg-indigo-50 rounded-2xl p-5 border-l-4 border-indigo-500 flex gap-4">
                                        <Icon name="Info" className="text-indigo-500 shrink-0" />
                                        <p className="text-sm text-indigo-900 leading-relaxed italic">"{currentDay.tips}"</p>
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <div className="bg-slate-900 rounded-[2rem] p-8 text-white shadow-2xl relative overflow-hidden">
                                        <div className="absolute -top-4 -right-4 opacity-10"><Icon name="Clock" size={120} /></div>
                                        <h3 className="text-xs font-black uppercase tracking-widest text-indigo-400 mb-4">Cronômetro de Foco</h3>
                                        <div className="text-5xl font-mono font-bold mb-8 tracking-tighter tabular-nums">{formatTime(timerSeconds)}</div>
                                        <div className="grid grid-cols-2 gap-3 relative z-10">
                                            <button 
                                                onClick={() => setIsTimerRunning(!isTimerRunning)} 
                                                className={`py-4 rounded-2xl font-black uppercase text-xs flex items-center justify-center gap-2 transition-all ${isTimerRunning ? 'bg-rose-500 hover:bg-rose-600' : 'bg-emerald-500 hover:bg-emerald-600'}`}
                                            >
                                                <Icon name={isTimerRunning ? "Pause" : "Play"} size={16}/> {isTimerRunning ? 'Pausar' : 'Iniciar'}
                                            </button>
                                            <button onClick={() => setTimerSeconds(0)} className="bg-slate-800 py-4 rounded-2xl font-black flex items-center justify-center hover:bg-slate-700"><Icon name="RotateCcw" size={16}/></button>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                        <div className="flex justify-between items-center mb-4">
                                            <h4 className="text-xs font-black uppercase text-slate-400 tracking-widest">Resumo de Hoje</h4>
                                            <Icon name="Target" className="text-indigo-500" size={16} />
                                        </div>
                                        <div className="space-y-4">
                                            <div>
                                                <div className="flex justify-between text-xs font-bold mb-1">
                                                    <span>Tarefas Concluídas</span>
                                                    <span>{currentDay.tasks.filter(t => completedTasks[t.id]).length} / {currentDay.tasks.length}</span>
                                                </div>
                                                <div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                                                    <div 
                                                        className="bg-emerald-500 h-full transition-all duration-500" 
                                                        style={{width: `${(currentDay.tasks.filter(t => completedTasks[t.id]).length / currentDay.tasks.length) * 100}%`}}
                                                    ></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && (
                            <div className="space-y-8 animate-fade-in">
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                    {[
                                        { label: "Horas Estudadas", val: `${metrics.horas}h`, color: "text-slate-800", sub: "Tempo Total" },
                                        { label: "Aproveitamento", val: `${metrics.aproveitamento}%`, color: "text-emerald-600", sub: "Taxa de Acertos" },
                                        { label: "Questões", val: metrics.questoes, color: "text-indigo-600", sub: "Total Resolvido" },
                                        { label: "Erros", val: metrics.erros, color: "text-rose-500", sub: "Pontos de Atenção" }
                                    ].map((m, i) => (
                                        <div key={i} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">{m.label}</p>
                                            <h3 className={`text-2xl font-black ${m.color}`}>{m.val}</h3>
                                            <p className="text-[9px] font-bold text-slate-300 uppercase mt-1">{m.sub}</p>
                                        </div>
                                    ))}
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200">
                                        <h3 className="text-lg font-black mb-6 flex items-center gap-2">
                                            <Icon name="PlusCircle" className="text-indigo-500" /> Registrar Sessão
                                        </h3>
                                        <form onSubmit={handleAddLog} className="space-y-4">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Matéria</label>
                                                    <select 
                                                        className="w-full bg-slate-50 p-3 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-indigo-500 transition-all"
                                                        value={formData.materia}
                                                        onChange={e => setFormData({...formData, materia: e.target.value})}
                                                    >
                                                        {materias.map(m => <option key={m} value={m}>{m}</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Horas</label>
                                                    <input 
                                                        type="number" step="0.1" placeholder="Ex: 2.5"
                                                        className="w-full bg-slate-50 p-3 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-indigo-500"
                                                        value={formData.horas}
                                                        onChange={e => setFormData({...formData, horas: e.target.value})}
                                                    />
                                                </div>
                                            </div>
                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 uppercase ml-1">Assunto Específico</label>
                                                <input 
                                                    type="text" placeholder="Ex: Concordância Nominal FGV"
                                                    className="w-full bg-slate-50 p-3 rounded-xl text-sm font-bold border-none outline-none focus:ring-2 ring-indigo-500"
                                                    value={formData.assunto}
                                                    onChange={e => setFormData({...formData, assunto: e.target.value})}
                                                />
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-emerald-600 uppercase ml-1">Acertos</label>
                                                    <input 
                                                        type="number" placeholder="0"
                                                        className="w-full bg-emerald-50 p-3 rounded-xl text-sm font-bold border-none outline-none text-emerald-700"
                                                        value={formData.acertos}
                                                        onChange={e => setFormData({...formData, acertos: e.target.value})}
                                                    />
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-rose-500 uppercase ml-1">Erros</label>
                                                    <input 
                                                        type="number" placeholder="0"
                                                        className="w-full bg-rose-50 p-3 rounded-xl text-sm font-bold border-none outline-none text-rose-700"
                                                        value={formData.erros}
                                                        onChange={e => setFormData({...formData, erros: e.target.value})}
                                                    />
                                                </div>
                                            </div>
                                            <button className="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl hover:bg-indigo-700 transition-all shadow-lg active:scale-95 uppercase text-xs tracking-widest">
                                                Salvar Progresso
                                            </button>
                                        </form>
                                    </div>

                                    <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200 flex flex-col items-center justify-center">
                                        <h3 className="text-lg font-black mb-1">Qualidade do Estudo</h3>
                                        <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-8 italic">Dados Consolidados</p>
                                        
                                        <div className="relative w-48 h-48">
                                            <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90 drop-shadow-sm">
                                                <circle cx="18" cy="18" r="16" fill="none" stroke="#f1f5f9" strokeWidth="3.5"></circle>
                                                <circle 
                                                    cx="18" cy="18" r="16" fill="none" 
                                                    stroke="#10b981" strokeWidth="3.5" 
                                                    strokeDasharray={`${metrics.aproveitamento} 100`}
                                                    strokeLinecap="round"
                                                    className="transition-all duration-1000 ease-out"
                                                ></circle>
                                            </svg>
                                            <div className="absolute inset-0 flex flex-col items-center justify-center">
                                                <span className="text-4xl font-black text-slate-800">{metrics.aproveitamento}%</span>
                                                <span className="text-[9px] font-black text-emerald-600 uppercase">Aproveitamento</span>
                                            </div>
                                        </div>
                                        
                                        <div className="grid grid-cols-2 gap-10 mt-8">
                                            <div className="text-center">
                                                <p className="text-xl font-black text-emerald-600">{metrics.acertos}</p>
                                                <p className="text-[9px] font-black text-slate-400 uppercase">Acertos</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-xl font-black text-rose-500">{metrics.erros}</p>
                                                <p className="text-[9px] font-black text-slate-400 uppercase">Erros</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl border border-slate-200 overflow-hidden shadow-sm">
                                    <div className="p-6 border-b border-slate-50 flex items-center justify-between">
                                        <div className="flex items-center gap-2">
                                            <Icon name="History" className="text-slate-400" />
                                            <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest">Histórico de Estudos</h3>
                                        </div>
                                        <span className="text-[10px] font-bold text-slate-400">{studyLogs.length} registros</span>
                                    </div>
                                    <div className="overflow-x-auto no-scrollbar">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 tracking-tighter">
                                                <tr>
                                                    <th className="px-6 py-4">Data</th>
                                                    <th className="px-6 py-4">Matéria / Assunto</th>
                                                    <th className="px-6 py-4 text-center">Tempo</th>
                                                    <th className="px-6 py-4 text-center">Desempenho</th>
                                                    <th className="px-6 py-4 text-center">Ações</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-50">
                                                {studyLogs.length === 0 ? (
                                                    <tr>
                                                        <td colSpan="5" className="px-6 py-12 text-center text-slate-400 text-sm italic">Nenhum estudo registrado ainda.</td>
                                                    </tr>
                                                ) : (
                                                    studyLogs.map(log => (
                                                        <tr key={log.id} className="hover:bg-indigo-50/30 transition-colors group">
                                                            <td className="px-6 py-4">
                                                                <p className="text-xs font-black text-slate-400">{log.date}</p>
                                                            </td>
                                                            <td className="px-6 py-4">
                                                                <p className="text-xs font-black text-indigo-700 uppercase tracking-tight">{log.materia}</p>
                                                                <p className="text-sm font-bold text-slate-700">{log.assunto}</p>
                                                            </td>
                                                            <td className="px-6 py-4 text-center font-mono text-xs font-bold text-slate-600">
                                                                {log.horas}h
                                                            </td>
                                                            <td className="px-6 py-4">
                                                                <div className="flex items-center justify-center gap-2">
                                                                    <div className="text-center px-2 py-1 bg-emerald-50 rounded-lg">
                                                                        <p className="text-[10px] font-black text-emerald-600">{log.acertos}</p>
                                                                    </div>
                                                                    <span className="text-slate-200">/</span>
                                                                    <div className="text-center px-2 py-1 bg-rose-50 rounded-lg">
                                                                        <p className="text-[10px] font-black text-rose-500">{log.erros}</p>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                            <td className="px-6 py-4 text-center">
                                                                {deletingId === log.id ? (
                                                                    <div className="flex items-center justify-center gap-1">
                                                                        <button 
                                                                            onClick={() => {
                                                                                setStudyLogs(studyLogs.filter(l => l.id !== log.id));
                                                                                setDeletingId(null);
                                                                            }}
                                                                            className="px-2 py-1 bg-rose-500 text-white text-[10px] font-black rounded-lg uppercase"
                                                                        >Excluir</button>
                                                                        <button 
                                                                            onClick={() => setDeletingId(null)}
                                                                            className="px-2 py-1 bg-slate-200 text-slate-500 text-[10px] font-black rounded-lg uppercase"
                                                                        >X</button>
                                                                    </div>
                                                                ) : (
                                                                    <button 
                                                                        onClick={() => setDeletingId(log.id)}
                                                                        className="p-2 text-slate-300 hover:text-rose-500 transition-colors"
                                                                    >
                                                                        <Icon name="Trash2" size={16}/>
                                                                    </button>
                                                                )}
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'ciclo' && (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in">
                                {schedule.map(day => (
                                    <div 
                                        key={day.day} 
                                        onClick={() => { setCurrentCycleDay(day.day); setActiveTab('hoje'); }} 
                                        className={`p-6 rounded-[2rem] border-2 transition-all cursor-pointer group hover:translate-y-[-4px] ${currentCycleDay === day.day ? 'border-indigo-500 bg-white shadow-xl' : 'border-transparent bg-white shadow-sm hover:shadow-md'}`}
                                    >
                                        <div className="flex justify-between items-center mb-4">
                                            <span className={`text-[10px] font-black px-3 py-1 rounded-full ${currentCycleDay === day.day ? 'bg-indigo-500 text-white' : 'bg-slate-100 text-slate-400'}`}>DIA {day.day}</span>
                                            <div className={`w-3 h-3 rounded-full ${day.type === 'Folga' ? 'bg-indigo-400 shadow-[0_0_10px_rgba(129,140,248,0.5)]' : day.type === 'Trabalho' ? 'bg-amber-400' : 'bg-emerald-400'}`}></div>
                                        </div>
                                        <h4 className="font-black text-slate-800 text-lg mb-1">{day.type}</h4>
                                        <p className="text-xs font-bold text-slate-400 mb-4 uppercase tracking-tighter italic">{day.hours > 0 ? `${day.hours} Horas de Estudo` : 'Dia de Simulado'}</p>
                                        <div className="space-y-2">
                                            {day.tasks.map(t => (
                                                <div key={t.id} className="flex items-center gap-2 text-[11px] font-bold text-slate-500">
                                                    <div className={`w-1.5 h-1.5 rounded-full ${completedTasks[t.id] ? 'bg-emerald-400' : 'bg-slate-200'}`}></div>
                                                    <span className={completedTasks[t.id] ? 'line-through opacity-50' : ''}>{t.title}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Stats de Rodapé */}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-900/90 backdrop-blur-md text-white px-8 py-4 rounded-[2rem] shadow-2xl flex items-center gap-8 border border-white/10 z-50">
                        <div className="flex items-center gap-3">
                            <div className="p-1.5 bg-emerald-500 rounded-lg"><Icon name="Trophy" size={14}/></div>
                            <div className="flex flex-col">
                                <span className="text-xs font-black leading-none">{metrics.aproveitamento}%</span>
                                <span className="text-[8px] font-black uppercase text-emerald-400 tracking-tighter">Taxa Acerto</span>
                            </div>
                        </div>
                        <div className="w-px h-6 bg-slate-700"></div>
                        <div className="flex items-center gap-3">
                            <div className="p-1.5 bg-indigo-500 rounded-lg"><Icon name="Target" size={14}/></div>
                            <div className="flex flex-col">
                                <span className="text-xs font-black leading-none">{metrics.horas}h</span>
                                <span className="text-[8px] font-black uppercase text-indigo-400 tracking-tighter">Total Horas</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
