    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .animate-fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Tema Customizado Scrollbar p/ o Grid do GitHub (Responsivo ao Tema) */
        .git-scroll::-webkit-scrollbar { display: block; height: 6px; }
        .git-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; transition: all 0.3s; }
        .dark .git-scroll::-webkit-scrollbar-track { background: #050505; }
        .git-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; transition: all 0.3s; }
        .dark .git-scroll::-webkit-scrollbar-thumb { background: #1a1a1a; }
        .git-scroll::-webkit-scrollbar-thumb:hover { background: #2563eb; }
        .dark .git-scroll::-webkit-scrollbar-thumb:hover { background: #00ff88; }

        /* Transição global suave para o tema */
        *, *::before, *::after {
            transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, box-shadow;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 300ms;
        }

        /* Estilização para o input date */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
        .dark input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>

<body class="bg-slate-50 text-slate-900 dark:bg-darkbg dark:text-gray-200 transition-colors duration-500 min-h-screen">
    <div id="root"></div>

    <!-- Firebase SDKs via CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, where, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // SUA CONFIGURAÇÃO DO FIREBASE
        const userFirebaseConfig = {
            apiKey: "AIzaSy" + "A46Uem7mCWbN7wpxL3I_naKM8ZxcPzwZE",
            authDomain: "acompanhemento-de-estudos.firebaseapp.com",
            projectId: "acompanhemento-de-estudos",
            storageBucket: "acompanhemento-de-estudos.firebasestorage.app",

            appId: "1:1015147414874:web:b70c6d668b7c3bb8405f63"

        try {
            const app = initializeApp(userFirebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);
            const appId = 'study-fgv-pro-cloud';

            window.fb = {
                auth, db, appId, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged,
                GoogleAuthProvider, signInWithPopup,

            };
        } catch (e) {

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const [svgContent, setSvgContent] = useState("");
            useEffect(() => {
                const icon = window.lucide?.icons[name.toLowerCase()] || window.lucide?.icons[name] || window.lucide?.icons['help-circle'];
                if (icon) {
                    const content = icon[2].map(tag => {
                        const [tagName, attrs] = tag;
                        const attrStr = Object.entries(attrs).map(([k, v]) => `${k.replace(/[A-Z]/g, m => "-" + m.toLowerCase())}="${v}"`).join(' ');
                        return `<${tagName} ${attrStr}></${tagName}>`;
                    }).join('');
                    setSvgContent(content);
                }
            }, [name]);
            return (
                <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: svgContent }} />
            );
        };

        const parseDateStr = (dateStr) => {
            if (!dateStr) return new Date(0);
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                return new Date(parts[2], parts[1] - 1, parts[0]);
            }
            return new Date(dateStr);
        };

        const App = () => {
            // TEMA STATE
            const [isDarkMode, setIsDarkMode] = useState(() => {
                const saved = localStorage.getItem('fgv_theme');
                return saved !== null ? JSON.parse(saved) : true;
            });

            useEffect(() => {
                localStorage.setItem('fgv_theme', JSON.stringify(isDarkMode));
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDarkMode]);

            // AUTH STATES
            const [user, setUser] = useState(null);
            const [isLoginMode, setIsLoginMode] = useState(true);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [authError, setAuthError] = useState('');
            const [authLoading, setAuthLoading] = useState(false);
            
            // APP STATES
            const [studyLogs, setStudyLogs] = useState([]);
            const [completedTasks, setCompletedTasks] = useState({});
            const [stopPoints, setStopPoints] = useState({});
            const [dayProfiles, setDayProfiles] = useState({});
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [isSubmitting, setIsSubmitting] = useState(false);

            const [currentDayNumber, setCurrentDayNumber] = useState(1);
            const [activeTab, setActiveTab] = useState('hoje');
            const [dashSubTab, setDashSubTab] = useState('dias');
            const [expandedMateria, setExpandedMateria] = useState(null); 
            
            // FILTROS DASHBOARD QUESTÕES
            const [questionsFilter, setQuestionsFilter] = useState('7');
            const [customDateRange, setCustomDateRange] = useState({ start: '', end: '' });
            const [subjectFilter, setSubjectFilter] = useState('Todas'); // NOVO FILTRO DE DISCIPLINA
            
            const [timerSeconds, setTimerSeconds] = useState(0);
            const [isTimerRunning, setIsTimerRunning] = useState(false);

            const [showLogModal, setShowLogModal] = useState(false);
            const [activeTaskForLog, setActiveTaskForLog] = useState(null);
            const [logForm, setLogForm] = useState({ 
                assunto: '', h: '', m: '', s: '', 
                total: '', acertos: '', anotacoes: '', 
                tipoEstudo: 'teoria', tipoTeoria: 'pdf', 
                pdfPagina: '', videoAula: '', videoMinuto: '', videoSegundo: '', questaoParada: '' 
            });

            // 1. Auth Init & Listener
            useEffect(() => {
                if (!window.fb) {
                    setError("Firebase não inicializou.");
                    setLoading(false);
                    return;
                }

                const unsubscribe = window.fb.onAuthStateChanged(window.fb.auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            // 2. Data Fetching (Firestore)
            useEffect(() => {
                if (!user || !window.fb) return;

                const logsRef = window.fb.collection(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'studyLogs');
                const unsubLogs = window.fb.onSnapshot(logsRef, (snapshot) => {
                    setStudyLogs(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                }, (err) => {
                    console.error("Erro Firestore (Logs):", err);
                    setError("firestore/permission-denied");
                });

                const metaRef = window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'userMeta', 'state');
                const unsubMeta = window.fb.onSnapshot(metaRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.completedTasks) setCompletedTasks(data.completedTasks);
                        if (data.stopPoints) setStopPoints(data.stopPoints);
                        if (data.dayProfiles) setDayProfiles(data.dayProfiles);
                        if (data.currentDayNumber) setCurrentDayNumber(data.currentDayNumber);
                    }
                }, (err) => {
                    console.error("Erro Firestore (Meta):", err);
                    setError("firestore/permission-denied");
                });

                return () => { unsubLogs(); unsubMeta(); };
            }, [user]);

            // Handlers de Autenticação
            const handleAuth = async (e) => {
                e.preventDefault();
                if (!window.fb) return;
                setAuthLoading(true);
                setAuthError('');
                try {
                    if (isLoginMode) await window.fb.signInWithEmailAndPassword(window.fb.auth, email, password);
                    else await window.fb.createUserWithEmailAndPassword(window.fb.auth, email, password);
                } catch (err) {
                    console.error("Erro de Autenticação:", err);
                    switch (err.code) {
                        case 'auth/email-already-in-use': setAuthError('Este e-mail já está registado.'); break;
                        case 'auth/invalid-credential':
                        case 'auth/user-not-found':
                        case 'auth/wrong-password': setAuthError('E-mail ou palavra-passe incorretos.'); break;
                        case 'auth/weak-password': setAuthError('A palavra-passe deve ter pelo menos 6 caracteres.'); break;
                        case 'auth/invalid-email': setAuthError('Formato de e-mail inválido.'); break;
                        default: setAuthError('Ocorreu um erro. Verifique os dados e tente novamente.'); break;
                    }
                } finally { setAuthLoading(false); }
            };

            const handleGoogleAuth = async () => {
                if (!window.fb) return;
                setAuthLoading(true);
                setAuthError('');
                try {
                    const provider = new window.fb.GoogleAuthProvider();
                    await window.fb.signInWithPopup(window.fb.auth, provider);
                } catch (err) {
                    console.error("Erro de Autenticação Google:", err);
                    if (err.code === 'auth/popup-closed-by-user') setAuthError('O login com Google foi cancelado.');
                    else if (err.code === 'auth/unauthorized-domain') setAuthError('Domínio não autorizado. Adicione este site no Firebase (Authorized Domains).');
                    else setAuthError('Ocorreu um erro ao entrar com o Google.');
                } finally { setAuthLoading(false); }
            };

            const handleLogout = () => {
                if (window.fb) window.fb.signOut(window.fb.auth);
                setStudyLogs([]); setCompletedTasks({}); setStopPoints({}); setDayProfiles({}); setCurrentDayNumber(1);
            };

            const withTimeout = (promise, ms, errorMessage) => {
                let timeoutId;
                const timeoutPromise = new Promise((_, reject) => {
                    timeoutId = setTimeout(() => reject(new Error(errorMessage)), ms);
                });
                return Promise.race([promise, timeoutPromise]).finally(() => clearTimeout(timeoutId));
            };

            const updateCloudState = async (updatesPayload) => {
                if (!user || !window.fb) return;
                const metaRef = window.fb.doc(window.fb.db, 'artifacts', window.fb.appId, 'users', user.uid, 'userMeta', 'state');
                try {
                    await withTimeout(
                        window.fb.setDoc(metaRef, updatesPayload, { merge: true }),
                        8000,
                        "Timeout ao guardar o estado."
                    );
                } catch (e) {
                    console.error("Erro ao salvar estado:", e);
                    if (e.message.includes('permission') || e.code === 'permission-denied') setError("firestore/permission-denied");
                    else alert("Aviso: Falha na gravação do estado. " + e.message);
                }
            };

            const secondsToHMS = (totalSeconds) => {
                const h = Math.floor(totalSeconds / 3600);
                const m = Math.floor((totalSeconds % 3600) / 60);
                const s = totalSeconds % 60;
                return { h: h.toString().padStart(2, '0'), m: m.toString().padStart(2, '0'), s: s.toString().padStart(2, '0') };
            };

            const formatTimeString = (s) => {
                const { h, m, s: sec } = secondsToHMS(s);
                return `${h}:${m}:${sec}`;
            };

            // TRILHAS DE PROGRESSÃO RESTRUTURADAS (Sem Matemática pesada no Trabalho)
            const studyPools = {
                folga: [
                    { type: "Folga", idProg: 1, hours: 6, tasks: [{ id: "mc", title: "Matemática", cat: "Estudo", materia: "Matemática" }, { id: "ma", title: "Português", cat: "Estudo", materia: "Português" }], tips: "Aproveite a folga para focar na teoria densa de Matemática e Português." },
                    { type: "Folga", idProg: 2, hours: 6, tasks: [{ id: "mb", title: "Conhecimentos Bancários", cat: "Estudo", materia: "Conhecimentos Bancários" }, { id: "me", title: "Informática", cat: "Estudo", materia: "Informática" }], tips: "Foco total nos detalhes teóricos de Bancários e Informática." },
                    { type: "Folga", idProg: 3, hours: 6, tasks: [{ id: "mc_av", title: "Matemática (Avanço)", cat: "Avanço", materia: "Matemática" }, { id: "ma_av", title: "Português (Avanço)", cat: "Avanço", materia: "Português" }], tips: "Aprofundamento: Resolva questões complexas da FGV (Probabilidade/Arranjos)." },
                    { type: "Folga", idProg: 4, hours: 6, tasks: [{ id: "mb_av", title: "Conhec. Bancários (Avanço)", cat: "Avanço", materia: "Conhecimentos Bancários" }, { id: "md", title: "Vendas e Negociação", cat: "Estudo", materia: "Vendas e Negociação" }], tips: "Bancários: Muita atenção às atualizações do Open Finance e ESG." }
                ],
                trabalho: [
                    { type: "Trabalho", idProg: 1, hours: 3, tasks: [{ id: "md", title: "Vendas e Negociação", cat: "Estudo", materia: "Vendas e Negociação" }], tips: "Dia de trabalho: Foco total e exclusivo na teoria de Vendas e Negociação." },
                    { type: "Trabalho", idProg: 2, hours: 3, tasks: [{ id: "mf", title: "Inglês", cat: "Estudo", materia: "Inglês" }], tips: "Leitura fluida: Avance apenas na teoria de Inglês focada na FGV." },
                    { type: "Trabalho", idProg: 3, hours: 3, tasks: [{ id: "me_rev", title: "Informática", cat: "Questões", materia: "Informática" }], tips: "Prática rápida: Foco único em resolução de questões e atalhos." },
                    { type: "Trabalho", idProg: 4, hours: 3, tasks: [{ id: "ma_rev", title: "Português", cat: "Questões", materia: "Português" }], tips: "Bateria de questões de Português. Atenção à interpretação." },
                    { type: "Trabalho", idProg: 5, hours: 3, tasks: [{ id: "mb_rev", title: "Conhecimentos Bancários", cat: "Questões", materia: "Conhecimentos Bancários" }], tips: "Bancários: Resolva listas de exercícios para fixar a legislação." }
                ],
                livre: [
                    { type: "Livre", idProg: 1, hours: 4, tasks: [{ id: "sim", title: "Simulado Completo", cat: "Avaliação", materia: "Simulados" }, { id: "red", title: "Redação", cat: "Avaliação", materia: "Redação" }], tips: "Redação: Estruture o texto claramente em 4 parágrafos." }
                ]
            };

            // Fallback para exibir na aba "Ciclo" (Visualização Base)
            const scheduleCycleBase = [
                { day: 1, type: "Folga", tasks: studyPools.folga[0].tasks, tips: studyPools.folga[0].tips },
                { day: 2, type: "Trabalho", tasks: studyPools.trabalho[0].tasks, tips: studyPools.trabalho[0].tips },
                { day: 3, type: "Folga", tasks: studyPools.folga[1].tasks, tips: studyPools.folga[1].tips },
                { day: 4, type: "Trabalho", tasks: studyPools.trabalho[1].tasks, tips: studyPools.trabalho[1].tips },
                { day: 5, type: "Folga", tasks: studyPools.folga[2].tasks, tips: studyPools.folga[2].tips },
                { day: 6, type: "Trabalho", tasks: studyPools.trabalho[2].tasks, tips: studyPools.trabalho[2].tips },
                { day: 7, type: "Livre", tasks: studyPools.livre[0].tasks, tips: studyPools.livre[0].tips }
            ];

            const { currentDayTasks, currentDayMeta } = useMemo(() => {
                let baseTasks = [];
                let meta = { type: "Aguardando Perfil...", hours: 0, tips: "Selecione o seu perfil de disponibilidade para iniciar as missões deste dia." };
                const profileToday = dayProfiles[currentDayNumber];

                if (profileToday && studyPools[profileToday]) {
                    let pastCount = 0;
                    for (let i = 1; i < currentDayNumber; i++) {
                        if (dayProfiles[i] === profileToday) pastCount++;
                    }
                    
                    const pool = studyPools[profileToday];
                    meta = pool[pastCount % pool.length];
                    baseTasks = meta.tasks;
                }

                const reviews = [];
                if (profileToday) {
                    const gaps = [1, 7, 15, 30];
                    gaps.forEach(gap => {
                        const targetDay = currentDayNumber - gap;
                        if (targetDay > 0) {
                            const subjectsOnTarget = studyLogs
                                .filter(log => log.recordedDay === targetDay && log.tipoEstudo === 'teoria')
                                .map(log => log.materia);
                            
                            [...new Set(subjectsOnTarget)].forEach(sub => {
                                reviews.push({
                                    id: `rev-${gap}-${sub.toLowerCase()}`,
                                    title: `Revisão ${gap} Dias: ${sub}`,
                                    cat: "Revisão",
                                    materia: sub
                                });
                            });
                        }
                    });
                }

                return { currentDayTasks: [...reviews, ...baseTasks], currentDayMeta: meta };
            }, [currentDayNumber, studyLogs, dayProfiles]);

            const metrics = useMemo(() => {
                const logsByMateria = studyLogs.reduce((acc, log) => {
                    if (!acc[log.materia]) {
                        acc[log.materia] = { totalSeconds: 0, acertos: 0, erros: 0, assuntos: [], assuntosStats: {} };
                    }
                    acc[log.materia].totalSeconds += (log.totalSeconds || 0);
                    acc[log.materia].acertos += (log.acertos || 0);
                    acc[log.materia].erros += (log.erros || 0);
                    acc[log.materia].assuntos.push({ assunto: log.assunto, date: log.fullDate });
                    
                    const assuntoKey = log.assunto || 'Sem assunto definido';
                    if (!acc[log.materia].assuntosStats[assuntoKey]) {
                        acc[log.materia].assuntosStats[assuntoKey] = { acertos: 0, erros: 0, totalSeconds: 0 };
                    }
                    acc[log.materia].assuntosStats[assuntoKey].acertos += (log.acertos || 0);
                    acc[log.materia].assuntosStats[assuntoKey].erros += (log.erros || 0);
                    acc[log.materia].assuntosStats[assuntoKey].totalSeconds += (log.totalSeconds || 0);

                    return acc;
                }, {});

                const intensityMap = {};
                studyLogs.forEach(log => {
                    if (!intensityMap[log.recordedDay]) intensityMap[log.recordedDay] = 0;
                    intensityMap[log.recordedDay] += (log.totalSeconds || 0);
                });

                return {
                    totalSeconds: studyLogs.reduce((a, b) => a + (b.totalSeconds || 0), 0),
                    totalAcertos: studyLogs.reduce((a, b) => a + (b.acertos || 0), 0),
                    totalErros: studyLogs.reduce((a, b) => a + (b.erros || 0), 0),
                    diasEstudados: new Set(studyLogs.map(l => l.fullDate)).size,
                    logsByMateria,
                    intensityMap
                };
            }, [studyLogs]);

            // Opções de filtro de disciplinas
            const subjectsOptions = useMemo(() => {
                const subs = new Set(studyLogs.map(l => l.materia).filter(Boolean));
                return ['Todas as Matérias', ...Array.from(subs)];
            }, [studyLogs]);

            // Dashboard Interativo de Questões (Cálculo)
            const filteredQuestionsData = useMemo(() => {
                const now = new Date();
                now.setHours(23, 59, 59, 999);
                let startDate = new Date();
                startDate.setHours(0, 0, 0, 0);

                if (questionsFilter === '7') startDate.setDate(now.getDate() - 7);
                else if (questionsFilter === '15') startDate.setDate(now.getDate() - 15);
                else if (questionsFilter === '30') startDate.setDate(now.getDate() - 30);
                else if (questionsFilter === 'custom') {
                    if (customDateRange.start) {
                        const [y, m, d] = customDateRange.start.split('-');
                        startDate = new Date(y, m - 1, d, 0, 0, 0, 0);
                    } else {
                        startDate = new Date(0); 
                    }
                    if (customDateRange.end) {
                        const [y, m, d] = customDateRange.end.split('-');
                        now.setTime(new Date(y, m - 1, d, 23, 59, 59, 999).getTime());
                    }
                }

                const filteredLogs = studyLogs.filter(log => {
                    if (!log.fullDate) return false;
                    const logDate = parseDateStr(log.fullDate);
                    const isDateValid = logDate >= startDate && logDate <= now;
                    const isSubjectValid = subjectFilter === 'Todas as Matérias' || log.materia === subjectFilter;
                    return isDateValid && isSubjectValid;
                });

                const totalAcertos = filteredLogs.reduce((a, b) => a + (b.acertos || 0), 0);
                const totalErros = filteredLogs.reduce((a, b) => a + (b.erros || 0), 0);
                const total = totalAcertos + totalErros;
                const perc = total > 0 ? ((totalAcertos / total) * 100).toFixed(1) : 0;

                return { total, totalAcertos, totalErros, perc };
            }, [studyLogs, questionsFilter, customDateRange, subjectFilter]);

            const last7DaysHours = useMemo(() => {
                const days = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toLocaleDateString('pt-BR');
                    
                    const logsOfDay = studyLogs.filter(l => l.fullDate === dateStr);
                    const totalSec = logsOfDay.reduce((acc, l) => acc + (l.totalSeconds || 0), 0);
                    
                    days.push({
                        label: d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '').substring(0,3),
                        hours: totalSec / 3600
                    });
                }
                return days;
            }, [studyLogs]);
            const maxHours = Math.max(...last7DaysHours.map(d => d.hours), 0.5);

            useEffect(() => {
                let interval = null;
                if (isTimerRunning) interval = setInterval(() => setTimerSeconds(s => s + 1), 1000);
                else clearInterval(interval);
                return () => clearInterval(interval);
            }, [isTimerRunning]);

            const selectDayProfile = (profile) => {
                const newProfiles = { ...dayProfiles, [currentDayNumber]: profile };
                setDayProfiles(newProfiles);
                updateCloudState({ dayProfiles: newProfiles });
            };

            const handleToggleTask = (task) => {

                                    <span className="text-[8px] font-black uppercase text-blue-600 dark:text-neon tracking-[0.2em] mt-0.5 transition-colors duration-500">Horas Master</span>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
